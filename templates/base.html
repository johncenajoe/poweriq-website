<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Power IQ{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">
      <img src="/static/img/logo.png" alt="Power IQ" class="nav-logo-img" />
      <span class="logo-piq">POWER IQ</span>
    </a>
    <ul class="nav-links">
      <li><a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a></li>
      <li><a href="/credits" class="nav-link {% if request.path == '/credits' %}active{% endif %}">Credits</a></li>
      <li><a href="/library" class="nav-link {% if request.path == '/library' %}active{% endif %}">Library</a></li>
      <li><a href="/jobs" class="nav-link {% if request.path == '/jobs' %}active{% endif %}">Jobs</a></li>
    </ul>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Power IQ Agency &nbsp;&mdash;&nbsp; Season 01</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
